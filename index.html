<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DeskBuddy AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #080810;
    --surface: #0f0f1e;
    --surface2: #161628;
    --accent: #6C63FF;
    --accent2: #FF6584;
    --accent3: #43E97B;
    --text: #E8E8FF;
    --muted: #7070A0;
    --border: #1e1e36;
    --glow: rgba(108,99,255,0.15);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  header {
    padding: 16px 28px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; }
  .logo-text span { color: var(--accent); }
  .header-caps {
    margin-left: auto;
    display: flex; gap: 8px;
  }
  .cap-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .cap-btn:hover { border-color: var(--accent); color: var(--text); }
  .cap-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  /* Main Layout */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* Chat */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Ambient bg glow */
  .chat-area::before {
    content: '';
    position: absolute;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(108,99,255,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
    z-index: 1;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Welcome */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 12px;
    text-align: center;
    padding: 40px 20px;
  }
  .welcome-icon {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 34px;
    box-shadow: 0 0 40px rgba(108,99,255,0.3);
    margin-bottom: 8px;
  }
  .welcome h1 {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
  }
  .welcome h1 span { color: var(--accent); }
  .welcome p { color: var(--muted); font-size: 15px; max-width: 420px; line-height: 1.6; }
  .quick-actions {
    display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
    margin-top: 12px;
  }
  .qa-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 12px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 8px;
  }
  .qa-btn:hover { border-color: var(--accent); background: var(--glow); transform: translateY(-2px); }

  /* Messages */
  .msg {
    display: flex;
    gap: 12px;
    animation: msgIn 0.25s ease;
    max-width: 780px;
    margin: 0 auto;
    width: 100%;
  }
  @keyframes msgIn {
    from { opacity:0; transform: translateY(10px); }
    to { opacity:1; transform: translateY(0); }
  }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 34px; height: 34px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .msg.user .msg-avatar { background: linear-gradient(135deg, var(--accent2), #ff9a9e); }
  .msg.ai .msg-avatar { background: linear-gradient(135deg, var(--accent), #a855f7); }
  .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 12px 16px;
    border-radius: 16px;
    max-width: calc(100% - 50px);
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
  }
  .msg.user .msg-bubble {
    background: linear-gradient(135deg, #1a1a3e, #2a1a4e);
    border-color: rgba(108,99,255,0.3);
  }
  .msg-bubble img {
    max-width: 300px;
    border-radius: 10px;
    margin-top: 8px;
    display: block;
  }
  .doc-download {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, var(--accent), #a855f7);
    color: white;
    padding: 10px 18px;
    border-radius: 10px;
    text-decoration: none;
    font-size: 13px;
    margin-top: 10px;
    font-weight: 600;
    transition: opacity 0.2s;
  }
  .doc-download:hover { opacity: 0.85; }
  .typing {
    display: flex; gap: 5px; align-items: center; padding: 4px 0;
  }
  .typing span {
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); opacity:0.5; }
    30% { transform: translateY(-6px); opacity:1; }
  }

  /* Image preview */
  .img-preview {
    position: relative;
    display: inline-block;
    margin-bottom: 8px;
  }
  .img-preview img { width: 80px; height: 80px; object-fit: cover; border-radius: 10px; border: 2px solid var(--accent); }
  .img-preview .remove-img {
    position: absolute; top: -6px; right: -6px;
    background: var(--accent2); color: white;
    border: none; border-radius: 50%;
    width: 20px; height: 20px;
    cursor: pointer; font-size: 12px;
    display: flex; align-items: center; justify-content: center;
  }

  /* Input area */
  .input-area {
    padding: 16px 20px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    position: relative;
    z-index: 1;
    flex-shrink: 0;
  }
  .input-bar {
    max-width: 780px;
    margin: 0 auto;
  }
  #img-preview-wrap { margin-bottom: 8px; }
  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 10px 12px;
    transition: border-color 0.2s;
  }
  .input-row:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow); }
  #userInput {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    resize: none;
    outline: none;
    max-height: 120px;
    min-height: 24px;
    line-height: 1.5;
  }
  #userInput::placeholder { color: var(--muted); }
  .action-btns { display: flex; gap: 6px; align-items: center; }
  .icon-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 6px;
    border-radius: 8px;
    font-size: 16px;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .icon-btn:hover { background: var(--border); color: var(--text); }
  .send-btn {
    background: linear-gradient(135deg, var(--accent), #a855f7);
    border: none;
    color: white;
    width: 36px; height: 36px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .send-btn:hover { transform: scale(1.08); box-shadow: 0 4px 12px rgba(108,99,255,0.4); }
  .send-btn:disabled { opacity: 0.4; cursor: default; transform: none; }
  #fileInput { display: none; }
  .hint { text-align: center; font-size: 11px; color: var(--muted); margin-top: 8px; }
</style>
</head>
<body>

<header>
  <div class="logo">🤖</div>
  <div class="logo-text">Desk<span>Buddy</span></div>
  <div class="header-caps">
    <button class="cap-btn active" onclick="setMode('chat')">💬 Chat</button>
    <button class="cap-btn" onclick="setMode('doc')">📄 Docs</button>
    <button class="cap-btn" onclick="setMode('image')">🎨 Image</button>
  </div>
</header>

<div class="main">
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🤖</div>
        <h1>Hey, I'm <span>DeskBuddy</span></h1>
        <p>Your smart AI assistant. Chat with me, create stunning documents, or generate images — just describe what you want.</p>
        <div class="quick-actions">
          <button class="qa-btn" onclick="quickSend('📄 Write me a professional report about climate change')">📄 Create a Word doc</button>
          <button class="qa-btn" onclick="quickSend('📊 Make an Excel sheet tracking monthly expenses with columns for Date, Category, Amount, Notes')">📊 Excel spreadsheet</button>
          <button class="qa-btn" onclick="quickSend('🎨 Generate an image of a futuristic city at night')">🎨 Generate image</button>
          <button class="qa-btn" onclick="quickSend('📊 Create a PowerPoint presentation about Artificial Intelligence with 5 slides')">📊 Make a PPT</button>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-bar">
        <div id="img-preview-wrap"></div>
        <div class="input-row">
          <textarea id="userInput" placeholder="Ask me anything, describe a document, or request an image..." rows="1"
            onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <div class="action-btns">
            <input type="file" id="fileInput" accept="image/*" onchange="handleImageUpload(event)"/>
            <button class="icon-btn" title="Attach image" onclick="document.getElementById('fileInput').click()">📎</button>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
          </div>
        </div>
        <div class="hint">DeskBuddy can make mistakes. Double-check important info.</div>
      </div>
    </div>
  </div>
</div>

<script>
let messages = [];
let currentImage = null;
let currentMode = 'chat';

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.cap-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  const hints = {
    chat: 'Ask me anything, describe a document, or request an image...',
    doc: 'Describe the document you want — e.g. "Write a report about AI with 3 sections"',
    image: 'Describe the image you want to generate...'
  };
  document.getElementById('userInput').placeholder = hints[mode];
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function handleImageUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    currentImage = reader.result;
    const wrap = document.getElementById('img-preview-wrap');
    wrap.innerHTML = `<div class="img-preview">
      <img src="${currentImage}" alt="preview"/>
      <button class="remove-img" onclick="removeImage()">✕</button>
    </div>`;
  };
  reader.readAsDataURL(file);
}

function removeImage() {
  currentImage = null;
  document.getElementById('img-preview-wrap').innerHTML = '';
  document.getElementById('fileInput').value = '';
}

function quickSend(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function addMsg(role, content, extra = null) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = role === 'user' ? '👤' : '🤖';
  let bubbleContent = content;

  if (extra?.type === 'image') {
    bubbleContent += `<br/><img src="${extra.url}" alt="Generated image" loading="lazy"/>`;
  }
  if (extra?.type === 'download') {
    bubbleContent += `<br/><a href="${extra.url}" download class="doc-download">⬇️ Download ${extra.filename}</a>`;
  }

  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div class="msg-bubble">${bubbleContent}</div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function addTyping() {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing-indicator';
  div.innerHTML = `
    <div class="msg-avatar">🤖</div>
    <div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;
  input.value = '';
  input.style.height = 'auto';

  addMsg('user', text, currentImage ? { type: 'image', url: currentImage } : null);

  const imgToSend = currentImage;
  removeImage();

  messages.push({ role: 'user', content: text });
  addTyping();

  try {
    // Check for document/image intent via keywords first
    const lower = text.toLowerCase();
    const wantsWord = lower.includes('word doc') || lower.includes('write a') || lower.includes('write me') || lower.includes('report') || lower.includes('essay') || lower.includes('letter');
    const wantsExcel = lower.includes('excel') || lower.includes('spreadsheet') || lower.includes('table') || lower.includes('sheet');
    const wantsPPT = lower.includes('powerpoint') || lower.includes('ppt') || lower.includes('presentation') || lower.includes('slides');
    const wantsImage = lower.includes('generate an image') || lower.includes('create an image') || lower.includes('draw') || lower.includes('make an image') || lower.includes('generate image');

    // Get AI response
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages, image: imgToSend })
    });
    const data = await res.json();
    const reply = data.reply || 'Something went wrong.';
    removeTyping();

    messages.push({ role: 'assistant', content: reply });

    // Check for document request in reply
    if (reply.includes('DOCUMENT_REQUEST:')) {
      const jsonStr = reply.split('DOCUMENT_REQUEST:')[1].trim();
      try {
        const docReq = JSON.parse(jsonStr);
        addMsg('ai', `✅ Got it! Generating your ${docReq.type.toUpperCase()} file now...`);
        await generateDocument(docReq.type, docReq.title, docReq.content);
        return;
      } catch {}
    }

    if (reply.includes('IMAGE_REQUEST:')) {
      const jsonStr = reply.split('IMAGE_REQUEST:')[1].trim();
      try {
        const imgReq = JSON.parse(jsonStr);
        addMsg('ai', '🎨 Generating your image...');
        await generateImage(imgReq.prompt);
        return;
      } catch {}
    }

    // Smart routing based on user text
    if (wantsWord || wantsExcel || wantsPPT) {
      const type = wantsPPT ? 'ppt' : wantsExcel ? 'excel' : 'word';
      addMsg('ai', reply);
      await generateDocument(type, text.slice(0, 50), reply);
      return;
    }

    if (wantsImage) {
      addMsg('ai', reply);
      await generateImage(text);
      return;
    }

    addMsg('ai', reply);

  } catch (err) {
    removeTyping();
    addMsg('ai', '❌ Something went wrong. Please try again.');
  }

  sendBtn.disabled = false;
}

async function generateDocument(type, title, content) {
  try {
    const res = await fetch(`/api/documents/${type}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: title.slice(0, 60), content })
    });

    if (!res.ok) throw new Error('Document generation failed');

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const ext = type === 'word' ? 'docx' : type === 'excel' ? 'xlsx' : 'pptx';
    const filename = `DeskBuddy_${type}_${Date.now()}.${ext}`;

    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();

    addMsg('ai', `✅ Your ${type.toUpperCase()} file is ready! Check your downloads. 📁`);
  } catch (err) {
    addMsg('ai', `❌ Failed to generate document. Please try again.`);
  }
}

async function generateImage(prompt) {
  try {
    const res = await fetch('/api/images/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });
    const data = await res.json();
    if (data.url) {
      addMsg('ai', '🎨 Here\'s your generated image!', { type: 'image', url: data.url });
    } else {
      addMsg('ai', '❌ Image generation failed.');
    }
  } catch {
    addMsg('ai', '❌ Image generation failed.');
  }
}
</script>
</body>
</html>
